[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, eft

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, "admin") || (g(r.sub, p.sub) && keyMatch(r.obj, p.obj) && r.act == p.act) || (is_owner(r.sub, r.obj) && (r.act == "update" || r.act == "delete"))

[functions]
is_owner = is_owner
