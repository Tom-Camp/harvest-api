name: SBOM and Vulnerability Scan

on:
  pull_request:
    branches:
      - '**'

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t myapp:latest .

      - name: Run Syft to generate SBOM
        uses: anchore/syft-action@v0.15.7
        with:
          image: myapp:latest
          output: syft-sbom.json

      - name: Run Grype to scan for vulnerabilities
        uses: anchore/grype-action@v0.15.0
        with:
          sbom: syft-sbom.json
