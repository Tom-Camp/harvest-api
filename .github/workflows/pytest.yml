name: Run Python Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_NAME: "harvesting.food API"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: '["http://localhost:5000"]'
      DATABASE_URL: sqlite+aiosqlite:///./test_auth.db
      ENVIRONMENT: development
      HASH_ALGORITHM: HS256
      INITIAL_USER_NAME: test_user
      INITIAL_USER_MAIL: test@example.com
      INITIAL_USER_PASS: Password!23
      LOG_LEVEL: INFO
      LOG_NAME: harvestLogs
      LOG_ACCESS_NAME: harvestAccessLogs
      LOG_JSON_FORMAT: false
      POSTGRES_DB: postgress
      POSTGRES_HOST: postgress
      POSTGRES_PASS: postgress
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgress
      SECRET_KEY: test_secret_key
      USER_SECRET: test_user_key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          python-version-file: pyproject.toml

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (dev + extras)
        run: uv sync --locked --all-extras --dev

      - name: Run pytest
        run: uv run pytest -q
