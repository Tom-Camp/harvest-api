name: Run Python Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: python -m pip install --upgrade pipx && pipx install uv

      - name: Install dependencies with uv
        run: uv sync

      - name: Run tests
        run: |
          pytest
